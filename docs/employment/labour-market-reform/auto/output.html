<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Candidate sub-topics for 'Labour market reform'</title>
  <link href="https://cdn.jsdelivr.net/npm/tabulator-tables@5.0.8/dist/css/tabulator.min.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/tabulator-tables@5.0.8/dist/js/tabulator.min.js"></script>
</head>
<body>
  <h1>Candidate sub-topics for 'Labour market reform'</h1>
  <div id="csv-table"></div>

  <script>
    fetch('output.csv')
      .then(response => response.text())
      .then(csvText => {
        Papa.parse(csvText, {
          header: true,
          skipEmptyLines: true,
          complete: function(results) {
            const data = results.data;
            const table = new Tabulator("#csv-table", {
              data: data,
              layout: "fitDataStretch",
              groupBy: "topic_name",
              groupHeader: function(value, count, data, group) {
               return value + " (" + count + " content items)";
              },
              columns: [
                {
                 title: "Topic name",
                 field: "topic_name",
                 headerSort: false
                },
                {
                 title: "Content item",
                 field: "content_item_url",
                 formatter: function(cell, formatterParams, onRendered) {
                   const title = cell.getRow().getData().content_item_title;
                   const url = cell.getValue();
                   return `<a href="${url}" target="_blank">${title}</a>`;
                 },
                 headerSort: false
                },
                {
                  title: "Probability (%)",
                  field: "content_item_probability",
                  formatter: function(cell, formatterParams, onRendered) {
                    return Number.parseInt(cell.getValue() * 100);
                  },
                  width: 50,
                  headerSort: false
                }
              ],
              groupToggleElement: "header",
              groupStartOpen: false,
              height: "auto"
            });
          }
        });
      });
  </script>
</body>
</html>
